<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spectrum Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin="anonymous" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              app: {
                bg: '#18181b',          /* Zinc 900 Base */
                panel: '#18181b',       /* Zinc 900 */
                accent: '#a78bfa',      /* Violet 400 */
                text: '#f4f4f5',        /* Zinc 50 Text */
                textMuted: '#a1a1aa',   /* Zinc 400 Muted */
                border: '#27272a',      /* Zinc 800 */
              }
            },
            fontFamily: {
              sans: ['Pretendard', 'Inter', 'sans-serif'],
              mono: ['ui-monospace', 'SFMono-Regular', 'monospace']
            },
            boxShadow: {
                'neu-flat': '9px 9px 16px #0d0d0f, -9px -9px 16px #232327',
                'neu-pressed': 'inset 6px 6px 10px #0d0d0f, inset -6px -6px 10px #232327',
                'neu-btn': '6px 6px 10px #0d0d0f, -6px -6px 10px #232327',
                'neu-icon': '5px 5px 10px #0d0d0f, -5px -5px 10px #232327',
                'neu-thin': '3px 3px 6px #0d0d0f, -3px -3px 6px #232327',
            },
            fontSize: {
              'xxs': '0.7rem',
              'xs': '0.8rem',
              'sm': '0.95rem',
              'base': '1.05rem',
              'lg': '1.2rem',
              'xl': '1.4rem',
            },
            animation: {
                'slideUp': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                'fadeIn': 'fadeIn 0.3s ease-out forwards',
            },
            keyframes: {
                slideUp: {
                    '0%': { opacity: '0', transform: 'translateY(30px)' },
                    '100%': { opacity: '1', transform: 'translateY(0)' },
                },
                fadeIn: {
                    '0%': { opacity: '0' },
                    '100%': { opacity: '1' },
                }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #18181b;
        color: #f4f4f5;
        font-family: 'Pretendard', sans-serif;
        font-weight: 500;
        letter-spacing: 0.01em;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* --- HIDDEN SCROLLBARS (Scrollable but invisible) --- */
      ::-webkit-scrollbar {
        display: none;
      }
      
      * {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }

      /* --- NEUMORPHIC SLIDERS --- */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        background: transparent;
        height: 24px;
        width: 100%;
        cursor: pointer;
        display: block;
        margin: 0;
      }
      input[type="range"]:focus {
        outline: none;
      }
      
      /* Track Styling (Inset Shadow) */
      input[type="range"]::-webkit-slider-runnable-track {
        width: 100%;
        height: 8px;
        background: #18181b;
        border-radius: 10px;
        box-shadow: inset 2px 2px 5px #0d0d0f, inset -2px -2px 5px #232327;
        cursor: pointer;
      }
      
      /* Thumb Styling (Extruded) */
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        height: 18px; 
        width: 18px;
        border-radius: 50%;
        background: #a78bfa;
        cursor: grab;
        margin-top: -5px; 
        box-shadow: 0 0 8px rgba(167, 139, 250, 0.4), 3px 3px 6px #0d0d0f, -3px -3px 6px #232327;
        border: 1px solid rgba(255,255,255,0.2);
        transition: all 0.1s ease-out;
      }
      
      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.15);
        background: #c4b5fd;
        box-shadow: 0 0 12px rgba(167, 139, 250, 0.6), 3px 3px 6px #0d0d0f, -3px -3px 6px #232327;
      }
      
      input[type="range"]::-webkit-slider-thumb:active {
        cursor: grabbing;
        background: #8b5cf6;
        box-shadow: inset 2px 2px 4px rgba(0,0,0,0.3), inset -2px -2px 4px rgba(255,255,255,0.3);
        transform: scale(0.95);
      }

      /* Utilities */
      .glass-panel {
        background: rgba(24, 24, 27, 0.6);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      
      input[type="file"] {
          display: none;
      }

      /* Staggered Animation Delays */
      .stagger-1 { animation-delay: 100ms; }
      .stagger-2 { animation-delay: 200ms; }
      .stagger-3 { animation-delay: 300ms; }
      .stagger-4 { animation-delay: 400ms; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
